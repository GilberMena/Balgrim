services:
  postgres:
    image: postgres:16
    container_name: balgrim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: balgrim
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - balgrim_postgres_data:/var/lib/postgresql/data

volumes:
  balgrim_postgres_data:
